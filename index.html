<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu de la semaine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #fafaf8;
            color: #2d2d2d;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #1a5632, #2d8a56);
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }
        .header .week { font-size: 1rem; opacity: 0.9; }
        .header .subtitle { font-size: 0.85rem; opacity: 0.7; margin-top: 0.5rem; }
        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            background: #f0efe8;
            border-bottom: 1px solid #ddd;
        }
        nav a {
            text-decoration: none;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        nav a.active { background: #1a5632; color: white; }
        nav a:not(.active) { background: white; color: #1a5632; border: 1px solid #1a5632; }
        nav a:hover:not(.active) { background: #e8f5ee; }
        .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        .info-box {
            background: #e8f5ee;
            border-left: 4px solid #2d8a56;
            padding: 1rem 1.2rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .info-box strong { color: #1a5632; }
        .planning { display: grid; gap: 0.5rem; margin-bottom: 2rem; }
        .day-row {
            display: grid;
            grid-template-columns: 110px 1fr 1fr;
            gap: 0.5rem;
            align-items: stretch;
        }
        .day-label {
            background: #1a5632;
            color: white;
            padding: 0.8rem 0.6rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .meal-cell {
            background: white;
            border: 1px solid #e0dfd8;
            border-radius: 8px;
            padding: 0.7rem 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .meal-cell:hover {
            border-color: #2d8a56;
            box-shadow: 0 2px 8px rgba(45, 138, 86, 0.15);
        }
        .meal-cell .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            margin-bottom: 0.2rem;
        }
        .meal-cell .name { font-weight: 600; font-size: 0.95rem; color: #2d2d2d; }
        .meal-cell .tag {
            display: inline-block;
            font-size: 0.7rem;
            background: #f0efe8;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            margin-top: 0.3rem;
            color: #666;
        }
        .daily-base {
            background: white;
            border: 1px solid #e0dfd8;
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2rem;
        }
        .daily-base h3 { color: #1a5632; margin-bottom: 0.8rem; font-size: 1.1rem; }
        .daily-base ul { list-style: none; }
        .daily-base li {
            padding: 0.3rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #f5f5f0;
        }
        .daily-base li:last-child { border: none; }
        .daily-base li::before { content: "\2022 "; color: #2d8a56; font-weight: bold; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            max-width: 650px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            background: #f0efe8;
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { background: #e0dfd8; }
        .modal h2 { color: #1a5632; font-size: 1.4rem; margin-bottom: 0.3rem; padding-right: 2rem; }
        .modal .meta { color: #888; font-size: 0.85rem; margin-bottom: 1rem; }
        .modal h3 { color: #2d8a56; font-size: 1rem; margin: 1.2rem 0 0.5rem; }
        .modal ul { padding-left: 1.2rem; margin-bottom: 0.5rem; }
        .modal li { font-size: 0.9rem; margin-bottom: 0.3rem; }
        .modal ol { padding-left: 1.2rem; }
        .modal ol li { margin-bottom: 0.5rem; font-size: 0.9rem; }
        .modal .macros { display: flex; gap: 0.8rem; flex-wrap: wrap; margin: 0.8rem 0; }
        .modal .macro-tag {
            background: #e8f5ee;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1a5632;
        }
        .footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: #aaa; }
        @media (max-width: 600px) {
            .day-row { grid-template-columns: 1fr; }
            .day-label { padding: 0.5rem; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Menu de la semaine</h1>
    <div class="week" id="h-week"></div>
    <div class="subtitle" id="h-regime"></div>
</div>

<nav>
    <a href="index.html" class="active">Menu</a>
    <a href="liste-courses.html">Liste de courses</a>
</nav>

<div class="container">
    <div class="info-box" id="info-box"></div>
    <div class="planning" id="planning"></div>
    <div class="daily-base">
        <h3>Base quotidienne (chaque jour)</h3>
        <ul id="base-list"></ul>
    </div>
</div>

<div id="modals"></div>
<div class="footer" id="footer"></div>

<script>
fetch('menu.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    document.title = 'Menu de la semaine \u2014 ' + data.semaine.label;
    document.getElementById('h-week').textContent = data.semaine.label;
    document.getElementById('h-regime').textContent = data.info.regime;
    document.getElementById('info-box').innerHTML =
      '<strong>' + data.info.nbPlats + ' plats</strong> ' + data.info.description + ' ' + data.info.portions;

    var planEl = document.getElementById('planning');
    data.planning.forEach(function(day) {
      var dej = data.recettes[day.dejeuner.recette];
      var din = data.recettes[day.diner.recette];
      var row = document.createElement('div');
      row.className = 'day-row';
      row.innerHTML =
        '<div class="day-label">' + day.jour + '<br>' + day.date + '</div>' +
        '<div class="meal-cell" data-recipe="' + day.dejeuner.recette + '">' +
          '<div class="label">D\u00e9jeuner</div>' +
          '<div class="name">' + dej.nom + '</div>' +
          '<div class="tag">' + day.dejeuner.tag + '</div>' +
        '</div>' +
        '<div class="meal-cell" data-recipe="' + day.diner.recette + '">' +
          '<div class="label">D\u00eener</div>' +
          '<div class="name">' + din.nom + '</div>' +
          '<div class="tag">' + day.diner.tag + '</div>' +
        '</div>';
      planEl.appendChild(row);
    });

    var baseEl = document.getElementById('base-list');
    data.baseQuotidienne.forEach(function(b) {
      var li = document.createElement('li');
      li.innerHTML = '<strong>' + b.label + ' :</strong> ' + b.detail;
      baseEl.appendChild(li);
    });

    var modalsEl = document.getElementById('modals');
    Object.keys(data.recettes).forEach(function(id) {
      var r = data.recettes[id];
      var macrosHtml =
        '<span class="macro-tag">' + r.macros.kcal + ' kcal/portion</span>' +
        '<span class="macro-tag">' + r.macros.proteines + 'g prot\u00e9ines</span>' +
        '<span class="macro-tag">' + r.macros.glucides + 'g glucides</span>' +
        '<span class="macro-tag">' + r.macros.lipides + 'g lipides</span>';
      var ingHtml = r.ingredients.map(function(i) { return '<li>' + i + '</li>'; }).join('');
      var prepHtml = r.preparation.map(function(p) { return '<li>' + p + '</li>'; }).join('');
      var notesHtml = r.notes.map(function(n) { return '<li>' + n + '</li>'; }).join('');
      var overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'modal-' + id;
      overlay.innerHTML =
        '<div class="modal">' +
          '<button class="modal-close" data-close="' + id + '">\u2715</button>' +
          '<h2>' + r.nom + '</h2>' +
          '<div class="meta">Pour ' + r.portions + ' portions \u00b7 ' + r.temps + ' \u00b7 Budget : ' + r.budget + '</div>' +
          '<div class="macros">' + macrosHtml + '</div>' +
          '<h3>Ingr\u00e9dients</h3><ul>' + ingHtml + '</ul>' +
          '<h3>Pr\u00e9paration</h3><ol>' + prepHtml + '</ol>' +
          '<h3>Notes</h3><ul>' + notesHtml + '</ul>' +
        '</div>';
      modalsEl.appendChild(overlay);
    });

    document.getElementById('footer').textContent =
      'Mis \u00e0 jour le ' + data.footer.dateMAJ + ' \u00b7 ' + data.footer.note;

    // Event delegation
    document.addEventListener('click', function(e) {
      var cell = e.target.closest('.meal-cell');
      if (cell && cell.dataset.recipe) {
        openRecipe(cell.dataset.recipe);
        return;
      }
      var closeBtn = e.target.closest('.modal-close');
      if (closeBtn && closeBtn.dataset.close) {
        closeRecipe(closeBtn.dataset.close);
        return;
      }
      if (e.target.classList.contains('modal-overlay')) {
        e.target.classList.remove('active');
        document.body.style.overflow = '';
      }
    });
  });

function openRecipe(id) {
  document.getElementById('modal-' + id).classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeRecipe(id) {
  document.getElementById('modal-' + id).classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(function(m) { m.classList.remove('active'); });
    document.body.style.overflow = '';
  }
});
</script>
</body>
</html>
