<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste de courses</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #fafaf8;
            color: #2d2d2d;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #8b4513, #c4783e);
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }
        .header .week { font-size: 1rem; opacity: 0.9; }
        .header .budget { font-size: 1.1rem; margin-top: 0.5rem; font-weight: 600; }
        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem;
            background: #f0efe8;
            border-bottom: 1px solid #ddd;
        }
        nav a {
            text-decoration: none;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        nav a.active { background: #8b4513; color: white; }
        nav a:not(.active) { background: white; color: #8b4513; border: 1px solid #8b4513; }
        nav a:hover:not(.active) { background: #fdf0e6; }
        .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        .category { margin-bottom: 1.5rem; }
        .category-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.6rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid #c4783e;
        }
        .category-icon { font-size: 1.3rem; width: 32px; text-align: center; }
        .category-title { font-size: 1.1rem; font-weight: 700; color: #8b4513; }
        .category-cost { margin-left: auto; font-size: 0.85rem; color: #888; font-weight: 600; }
        .items { display: grid; gap: 0.3rem; }
        .item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.5rem 0.8rem;
            background: white;
            border: 1px solid #e8e7e0;
            border-radius: 8px;
            transition: all 0.15s;
            cursor: pointer;
        }
        .item:hover { border-color: #c4783e; }
        .item.checked { background: #f8f8f5; opacity: 0.5; }
        .item.checked .item-name { text-decoration: line-through; }
        .checkbox {
            width: 22px; height: 22px;
            border: 2px solid #c4783e;
            border-radius: 5px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .item.checked .checkbox { background: #c4783e; border-color: #c4783e; }
        .item.checked .checkbox::after { content: "\2713"; color: white; font-size: 0.85rem; font-weight: bold; }
        .item-name { flex: 1; font-size: 0.9rem; }
        .item-qty { font-size: 0.85rem; color: #888; font-weight: 600; white-space: nowrap; }
        .item-use { font-size: 0.75rem; color: #aaa; min-width: 80px; text-align: right; }
        .summary {
            background: white;
            border: 2px solid #c4783e;
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            margin-top: 1rem;
        }
        .summary h3 { color: #8b4513; margin-bottom: 0.5rem; }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #f0efe8;
        }
        .summary-row:last-child { border: none; font-weight: 700; font-size: 1rem; color: #8b4513; }
        .progress-bar { margin-top: 1rem; background: #f0efe8; border-radius: 10px; height: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: #c4783e; border-radius: 10px; transition: width 0.3s; width: 0%; }
        .progress-text { text-align: center; font-size: 0.8rem; color: #888; margin-top: 0.3rem; }
        .footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: #aaa; }
        @media (max-width: 600px) {
            .item-use { display: none; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Liste de courses</h1>
    <div class="week" id="h-week"></div>
    <div class="budget" id="h-budget"></div>
</div>

<nav>
    <a href="index.html">Menu</a>
    <a href="liste-courses.html" class="active">Liste de courses</a>
</nav>

<div class="container">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="progress-text" id="progress-text">0 / 0 articles coch\u00e9s</div>
    <div id="categories"></div>
    <div class="summary" id="summary"></div>
</div>

<div class="footer" id="footer"></div>

<script>
var storageKey = '';

fetch('menu.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    document.title = 'Liste de courses \u2014 ' + data.semaine.label;
    document.getElementById('h-week').textContent = 'Semaine du ' + data.semaine.label;
    document.getElementById('h-budget').textContent = 'Budget estim\u00e9 : ' + data.courses.budget;

    // Storage key unique par semaine
    storageKey = 'courses-' + data.semaine.debut;

    var catEl = document.getElementById('categories');
    data.courses.categories.forEach(function(cat) {
      var catDiv = document.createElement('div');
      catDiv.className = 'category';
      var headerHtml =
        '<div class="category-header">' +
          '<div class="category-icon">' + cat.icone + '</div>' +
          '<div class="category-title">' + cat.nom + '</div>' +
          '<div class="category-cost">' + cat.cout + '</div>' +
        '</div>';
      var itemsHtml = '<div class="items">';
      cat.items.forEach(function(item) {
        itemsHtml +=
          '<div class="item" onclick="toggleItem(this)">' +
            '<div class="checkbox"></div>' +
            '<div class="item-name">' + item.nom + '</div>' +
            '<div class="item-qty">' + item.qty + '</div>' +
            '<div class="item-use">' + item.usage + '</div>' +
          '</div>';
      });
      itemsHtml += '</div>';
      catDiv.innerHTML = headerHtml + itemsHtml;
      catEl.appendChild(catDiv);
    });

    // Summary
    var sumEl = document.getElementById('summary');
    var sumHtml = '<h3>Bilan budget estim\u00e9</h3>';
    data.courses.categories.forEach(function(cat) {
      sumHtml += '<div class="summary-row"><span>' + cat.nom + '</span><span>' + cat.cout + '</span></div>';
    });
    sumHtml += '<div class="summary-row"><span>Total estim\u00e9</span><span>' + data.courses.budget + '</span></div>';
    sumEl.innerHTML = sumHtml;

    // Footer
    document.getElementById('footer').textContent =
      'Mis \u00e0 jour le ' + data.footer.dateMAJ + ' \u00b7 Les articles "v\u00e9rifier stock" sont des basiques \u00e0 racheter si \u00e9puis\u00e9s';

    loadState();
  });

function toggleItem(el) {
  el.classList.toggle('checked');
  updateProgress();
  saveState();
}

function updateProgress() {
  var total = document.querySelectorAll('.item').length;
  var checked = document.querySelectorAll('.item.checked').length;
  document.getElementById('progress').style.width = (total ? (checked / total * 100) : 0) + '%';
  document.getElementById('progress-text').textContent = checked + ' / ' + total + ' articles coch\u00e9s';
}

function saveState() {
  var items = document.querySelectorAll('.item');
  var state = Array.from(items).map(function(i) { return i.classList.contains('checked'); });
  localStorage.setItem(storageKey, JSON.stringify(state));
}

function loadState() {
  var saved = localStorage.getItem(storageKey);
  if (saved) {
    var state = JSON.parse(saved);
    var items = document.querySelectorAll('.item');
    state.forEach(function(checked, i) {
      if (checked && items[i]) items[i].classList.add('checked');
    });
  }
  updateProgress();
}
</script>
</body>
</html>
